<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon E-commerce Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-meli sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛒 TechLibre</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex w-75 ms-lg-4">
                    <input class="form-control me-2 search-input" type="search" placeholder="Buscar productos, marcas y más..." aria-label="Search"> 
                </form>
            </div>
        </div>
    </nav>

    <main class="container my-5">
	<div class="card mb-5 shadow-sm">
            <div class="card-body">
            	<h5 class="card-title mb-3">Publicar Nuevo Producto</h5>
            	<form id="form-crear-producto" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="input-titulo" placeholder="Nombre del producto" required>
                    </div>
               	    <div class="col-md-2">
                    	<input type="number" class="form-control" id="input-precio" placeholder="Precio ($)" step="0.01" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="input-stock" placeholder="Cantidad" required>
                    </div>
                    <div class="col-md-4">
                        <input type="url" class="form-control" id="input-imagen" placeholder="URL de la imagen" required>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">Guardar Producto</button>
                    </div>
            	</form>
            </div>
    	</div>
        <h2 class="mb-4 fw-light">Ofertas en Tecnología</h2>
        
        <div class="row g-4" id="productos-contenedor">
            <div class="col-12 text-center" id="loading-spinner">
                <div class="spinner-border text-secondary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
